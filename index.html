<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Persistent Memory Workspace</title>
    <style>
        :root {
            --bg-primary: #1e1e2e;
            --bg-secondary: #181825;
            --bg-tertiary: #11111b;
            --text-normal: #cdd6f4;
            --text-muted: #a6adc8;
            --accent: #cba6f7;
            --user-bubble: #89b4fa;
            --text-on-accent: #11111b;
            --border: #313244;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-normal);
            overflow: hidden;
        }

        .app-container {
            display: flex; flex-direction: column; height: 100%; width: 100%; position: relative;
        }

        .tab-bar {
            display: flex; background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .tab-btn {
            flex: 1; padding: 14px; background: none; border: none;
            color: var(--text-muted); font-weight: 600; font-size: 0.95em;
            cursor: pointer; text-align: center; border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            color: var(--accent); border-bottom: 2px solid var(--accent);
            background-color: rgba(203, 166, 247, 0.05);
        }

        .view-content { flex-grow: 1; display: none; overflow: hidden; position: relative; }
        .view-content.active { display: flex; flex-direction: column; }

        .chat-wrapper { display: flex; flex-direction: column; height: 100%; padding: 12px; box-sizing: border-box; }
        .chat-input-container {
            display: flex; gap: 8px; padding-bottom: 12px;
            background-color: var(--bg-primary); border-bottom: 1px dashed var(--border); flex-shrink: 0;
        }
        .chat-input-box {
            flex-grow: 1; height: 42px; resize: none; border-radius: 8px;
            border: 1px solid var(--border); background-color: var(--bg-secondary);
            color: var(--text-normal); padding: 10px; font-size: 0.95em; box-sizing: border-box;
        }
        .chat-send-btn {
            background-color: var(--accent); color: var(--text-on-accent);
            border: none; padding: 0 16px; border-radius: 8px; cursor: pointer; font-weight: 600;
        }
        .chat-history-area { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }

        .msg-bubble { padding: 12px 14px; border-radius: 14px; max-width: 85%; font-size: 0.95em; line-height: 1.4; }
        .user-bubble { background-color: var(--user-bubble); color: var(--text-on-accent); align-self: flex-end; border-bottom-right-radius: 2px; }
        .agent-bubble { background-color: var(--bg-secondary); color: var(--text-normal); border-left: 3px solid var(--accent); align-self: flex-start; border-bottom-left-radius: 2px; }
        .error-bubble { background-color: rgba(243, 139, 168, 0.1); border: 1px solid #f38ba8; color: #f38ba8; align-self: center; text-align: center; }

        .file-download-badge {
            margin-top: 8px; padding: 6px 10px; background: var(--bg-tertiary);
            border: 1px solid var(--border); border-radius: 6px; display: inline-flex;
            align-items: center; gap: 6px; cursor: pointer; font-size: 0.8em; color: var(--accent);
        }

        .browser-wrapper { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .file-tree-sidebar { padding: 10px; background-color: var(--bg-secondary); border-bottom: 1px solid var(--border); max-height: 30%; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 6px; }
        .file-item { padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.85em; background-color: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-normal); }
        .file-item:hover { border-color: var(--accent); }
        .preview-pane { flex-grow: 1; background: white; border: none; width: 100%; }
        .empty-preview { display: flex; justify-content: center; align-items: center; height: 100%; color: var(--text-muted); text-align: center; padding: 20px; box-sizing: border-box; }

        .settings-btn { position: absolute; top: 10px; right: 12px; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-normal); border-radius: 14px; padding: 4px 10px; font-size: 0.8em; cursor: pointer; z-index: 10; }
        .settings-modal { display: none; position: absolute; inset: 0; background: rgba(17,17,27,0.95); padding: 20px; flex-direction: column; justify-content: center; z-index: 100; box-sizing: border-box; overflow-y: auto; }
        .settings-modal h2 { margin-top: 0; color: var(--accent); }
        .settings-row { margin-bottom: 14px; display: flex; flex-direction: column; gap: 4px; }
        .settings-row label { font-size: 0.8em; color: var(--text-muted); }
        .settings-row input { padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-normal); }
        
        .backup-zone {
            margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border);
            display: flex; gap: 10px;
        }
        .util-btn { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--border); font-weight: 600; font-size: 0.85em; cursor: pointer; text-align: center; color: var(--text-normal); background: var(--bg-tertiary); }
        .util-btn:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="app-container">
    <button class="settings-btn" onclick="toggleSettings(true)">⚙ Setup</button>

    <div class="tab-bar">
        <button class="tab-btn active" id="tab-chat" onclick="switchView('chat')">💬 Workspace</button>
        <button class="tab-btn" id="tab-browser" onclick="switchView('browser')">🌐 Browser Portal</button>
    </div>

    <div class="view-content active" id="view-chat">
        <div class="chat-wrapper">
            <div class="chat-input-container">
                <textarea class="chat-input-box" id="user-input" placeholder="Map note structures..."></textarea>
                <button class="chat-send-btn" id="send-btn" onclick="handleMessage()">Send</button>
            </div>
            <div class="chat-history-area" id="chat-stream"></div>
        </div>
    </div>

    <div class="view-content" id="view-browser">
        <div class="browser-wrapper">
            <div class="file-tree-sidebar" id="file-tree-list"></div>
            <div style="flex-grow: 1; display: flex; flex-direction: column;">
                <div class="empty-preview" id="empty-preview-notice">
                    <p>Select an architectural node file card above to load its live rendered canvas.</p>
                </div>
                <iframe class="preview-pane" id="browser-iframe" style="display: none;"></iframe>
            </div>
        </div>
    </div>

    <div class="settings-modal" id="config-panel">
        <h2>Engine Credentials Setup</h2>
        <div class="settings-row"><label>Gemini API Key</label><input type="password" id="cfg-key" placeholder="AIzaSy..."></div>
        <div class="settings-row"><label>Model String</label><input type="text" id="cfg-model" value="gemini-3.5-flash"></div>
        <button class="chat-send-btn" style="height: 44px; margin-top: 5px;" onclick="saveConfig()">Save Configurations</button>
        
        <h2>Vault Backup Systems</h2>
        <div class="backup-zone">
            <button class="util-btn" onclick="exportWholeVault()">📤 Export Whole Website</button>
            <button class="util-btn" onclick="document.getElementById('import-file-picker').click()">📥 Import Website</button>
            <input type="file" id="import-file-picker" style="display: none;" accept=".json" onchange="importWholeVault(event)">
        </div>
    </div>
</div>

<script>
    let config = JSON.parse(localStorage.getItem('direct_agent_config')) || { key: '', model: 'gemini-3.5-flash' };
    let virtualFiles = JSON.parse(localStorage.getItem('persistent_file_vault')) || {};
    let conversationHistory = JSON.parse(localStorage.getItem('persistent_chat_history')) || [];
    let currentSelectedFile = null;

    window.onload = () => {
        document.getElementById('cfg-key').value = config.key;
        document.getElementById('cfg-model').value = config.model;
        
        rebuildChatUIFromCache();
        updateFileTreeUI();
        if(!config.key) toggleSettings(true);
    };

    function toggleSettings(show) { document.getElementById('config-panel').style.display = show ? 'flex' : 'none'; }

    function saveConfig() {
        config.key = document.getElementById('cfg-key').value.trim();
        config.model = document.getElementById('cfg-model').value.trim();
        localStorage.setItem('direct_agent_config', JSON.stringify(config));
        toggleSettings(false);
    }

    function switchView(target) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        if (target === 'chat') {
            document.getElementById('tab-chat').classList.add('active');
            document.getElementById('view-chat').classList.add('active');
        } else {
            document.getElementById('tab-browser').classList.add('active');
            document.getElementById('view-browser').classList.add('active');
            updateFileTreeUI();
        }
    }
